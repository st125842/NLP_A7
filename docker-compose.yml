version: '3.8'
services:
  n8n:
    image: n8nio/n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - WEBHOOK_URL=https://hyperleucocytotic-michaela-bolometrically.ngrok-free.dev
      - GENERIC_TIMEZONE=Asia/
      - N8N_EDITOR_BASE_URL=http://localhost:5678
      - VUE_APP_URL_BASE_API=http://localhost:5678
    volumes:
      - n8n_data:/home/node/.n8n
volumes:
  n8n_data: